const LS_PROGRESS='hs_tango_progress';
const LS_STREAK='hs_tango_streak';
const lsGet=k=>{try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};
function fmtT(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function progressKey(catId,unitIdx){return catId+'_'+unitIdx;}
function updateStreak(){
  const today=new Date().toISOString().slice(0,10);
  let s=lsGet(LS_STREAK)||{lastDate:null,count:0};
  if(s.lastDate===today)return s.count;
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  s.count=(s.lastDate===yesterday)?s.count+1:1;
  s.lastDate=today;lsSet(LS_STREAK,s);return s.count;
}
function unitFile(catId,unitIdx){return 'HS_'+catId+'0'+(unitIdx+1)+'.html';}
function render(){
  const prog=lsGet(LS_PROGRESS)||{};
  document.getElementById('streakNum').textContent=updateStreak();
  const totalUnits=TANGO_DATA.reduce((a,c)=>a+c.unitCount,0);
  const doneUnits=Object.values(prog).filter(v=>v&&v.cleared).length;
  document.getElementById('doneNum').textContent=doneUnits;
  document.getElementById('overallBar').style.width=(doneUnits/totalUnits*100)+'%';
  const list=document.getElementById('catList');list.innerHTML='';
  TANGO_DATA.forEach(cat=>{
    const doneCat=Array.from({length:cat.unitCount},(_,i)=>{const p=prog[progressKey(cat.id,i)];return(p&&p.cleared)?1:0;}).reduce((a,b)=>a+b,0);
    const pct=Math.round(doneCat/cat.unitCount*100);
    const card=document.createElement('div');card.className='cat-card';
    const badge=doneCat===cat.unitCount?'<span class="cat-badge done-all">✅ 完了</span>':'<span class="cat-badge">'+doneCat+'/'+cat.unitCount+' 単元</span>';
    card.innerHTML='<div class="cat-head"><span class="cat-name">'+cat.id+'. '+cat.name+'</span>'+badge+'</div>'+'<div class="cat-progress-wrap"><div class="cat-progress" style="width:'+pct+'%"></div></div>'+'<div class="cat-units" id="units_'+cat.id+'"></div>';
    list.appendChild(card);
    const unitsDiv=card.querySelector('#units_'+cat.id);
    for(let i=0;i<cat.unitCount;i++){
      const p=prog[progressKey(cat.id,i)];
      const dot=document.createElement('div');
      dot.className='unit-dot'+(p&&p.cleared?(p.bestSec?' best':' cleared'):'');
      dot.textContent=i+1;
      dot.title=p&&p.bestSec?'ベスト:'+fmtT(p.bestSec):(p&&p.cleared?'クリア済み':'未挑戦');
      const ci=i;
      dot.addEventListener('click',e=>{e.stopPropagation();window.location.href=unitFile(cat.id,ci);});
      unitsDiv.appendChild(dot);
    }
    card.addEventListener('click',()=>{let t=0;for(let i=0;i<cat.unitCount;i++){const p=prog[progressKey(cat.id,i)];if(!(p&&p.cleared)){t=i;break;}}window.location.href=unitFile(cat.id,t);});
  });
}
render();
</script>
